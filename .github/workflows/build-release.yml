name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            build_cmd: npx electron-builder --mac --publish never
          - os: windows-latest
            build_cmd: npx electron-builder --win --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Setup engine binary
        if: matrix.os == 'macos-latest'
        run: |
          chmod +x scripts/setup-engine.sh
          ./scripts/setup-engine.sh

      - name: Setup engine binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $versionJson = Get-Content engine/version.json | ConvertFrom-Json
          $url = $versionJson.binaries.'win32-x64'
          $binDir = "bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null
          Write-Host "Downloading llama.cpp for Windows..."
          Invoke-WebRequest -Uri $url -OutFile "$binDir\llama-cpp.zip"
          Expand-Archive -Path "$binDir\llama-cpp.zip" -DestinationPath "$binDir\extracted" -Force
          $server = Get-ChildItem -Path "$binDir\extracted" -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          if ($server) {
            Copy-Item $server.FullName "$binDir\iimagine-engine.exe"
            Get-ChildItem -Path "$binDir\extracted" -Recurse -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName $binDir }
          }
          Remove-Item "$binDir\llama-cpp.zip" -Force
          Remove-Item "$binDir\extracted" -Recurse -Force
          Write-Host "Engine binary ready at $binDir\iimagine-engine.exe"

      - name: Build
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: artifacts/**/*
          generate_release_notes: true
